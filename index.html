<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BookTracker-Login</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="login-page">
            <div class="branding">
                <h1>📚 BookTracker</h1>
                <p>Track your reading journey</p>
                <p>"A reader lives a thousand lives before he dies."</p>
            </div>
            <div class="forms">
                <div class="forms-inner">
                <div class="tabs">
                <button class="tab">Login</button>
                <button class="tab">Register</button>
                </div>
                <form class="login-form">
                    <h2>Login</h2>
                    <label>Email</label>
                    <input type="email" placeholder="Enter email" required>

                    <label>Password</label>
                    <input type="password" placeholder="Enter password" required minlength="6">

                    <button type="submit">Sign In</button>

                    <p>Don't have an account? <a href="#">Register here</a></p>
                </form>
                <form class="register-form">
                    <h2>Register</h2>
                    <label>Name</label>
                    <input type="text" placeholder="Enter name" required>

                    <label>Email</label>
                    <input type="email" placeholder="Enter email" required>

                    <label>Password</label>
                    <input type="password" placeholder="Enter password" required minlength="6">

                    <label>Confirm Password</label>
                    <input type="password" placeholder="Confirm password" required>

                    <button type="submit">Create Account</button>

                    <p>Already have an account? <a href="#">Login here</a></p>
                </form>
                </div>



            </div>
        </div>
    </body>
</html>
