<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BookTracker-Add New Book</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav>
        <div class="logo">
            <a href="index.html">📚BookTracker</a>
        </div>

        <div class="links">
            <a href="books.html" >My Books</a>
            <a href="add-book.html" class="active">Add Book</a>
            <a href="#">Stats</a>
        </div>

        <div class="username">
            <span>Hello, Aiza</span>
            <a href="index.html">Logout</a>

        </div>
    </nav>
    <main>
        <div class="add-header">
            <a href="books.html" class="back-link"> ⬅️Back</a>
            <h1>Add New Book</h1>
            <p>Add another book to your personal library.</p>
            
        </div>
        <div class="form-card">
            <form>
                <div class="form-group">
                <label>Book Title</label>
                <input type="text" placeholder="Enter Book Title" required>
                </div>

                <div class="form-group">
                <label>Author</label>
                <input type="text" placeholder="Enter author's name" required>
                </div>

                <div class="form-row">


                <div class="form-group">
                <label>Genre</label>
                <select required>
                    <option value="">Select Genre</option>
                    <option>Fiction</option>
                    <option>Non-Fiction</option>
                    <option>Self Help</option>
                    <option>Fantasy</option>
                    <option>Science</option>
                    <option>Biography</option>
                    <option>Other</option>
                </select>
                </div>

                <div class="form-group">
                <label>Status</label>
                <select required>
                    <option value="">Select Status</option>
                    <option>Want to Read</option>
                    <option>Currently Reading</option>
                    <option>Finished</option>
                </select>
                </div>

                </div>

                <div class="form-row">

                <div class="form-group">
                <label>Total Pages</label>
                <input type="number" placeholder="e.g. 320">
                </div>

                <div class="form-group">
                <label>Rating</label>
                <input type="range" min="1" max="5">
                </div>

                </div>

                <div class="form-group">
                <label>Cover Image URL</label>
                <input type="url" placeholder="Paste Image URL or leave blank">
                </div>

                <div class="form-group">
                <label>Review/Notes</label>
                <textarea placeholder="Write your thoughts..."></textarea>
                </div>

                <div class="date-grid">

                <div class="form-row">

                <div class="form-group">
                <label>Date Started</label>
                <input type="date">
                </div>

                <div class="form-group">
                <label>Date Finished</label>
                <input type="date">
                </div>

                </div>
                </div>

                <div class="form-actions">
                
                <button type="submit">Add Book</button>
                

                
                <a href="books.html">Cancel</a>
                
                </div>
                



            </form>
        </div>

    </main>
    </body>
</html>
